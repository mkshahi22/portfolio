    <style>
/* General Styles */
/* General Styles */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Poppins", sans-serif;
    scroll-behavior: smooth;
}
body {
    background: #121212;
    color: #fff;
    text-align: center;
    padding-top: 80px; /* Added padding-top to prevent navbar overlap */
}
nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 50px;
    background: rgba(0, 0, 0, 0.9);
    position: fixed;
    width: 100%;
    top: 0;
    left: 0;
    z-index: 1000;
    transition: background 0.3s ease-in-out;
}
nav h2 {
    font-size: 26px;
    font-weight: bold;
    color: #ff5733;
}

.nav-links {
    list-style: none;
    display: flex;
}
.nav-links li {
    margin: 0 15px;
    position: relative;
}

.nav-links li a {
    text-decoration: none;
    color: #fff;
    font-size: 18px;
    padding: 5px 10px;
    transition: color 0.3s ease-in-out;
    position: relative;
}

/* Hover Effect */
.nav-links li a::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: -5px;
    width: 100%;
    height: 2px;
    background: #ff5733;
    transform: scaleX(0);
    transition: transform 0.3s ease-in-out;
}

.nav-links li a:hover::after {
    transform: scaleX(1);
}

.nav-links li a:hover {
    color: #ff5733;
}

/* Menu Toggle Button */
.menu-toggle {
    display: none;
    flex-direction: column;
    cursor: pointer;
}

.bar {
    background: white;
    height: 4px;
    width: 30px;
    margin: 5px 0;
    transition: 0.4s;
}

/* Responsive Design */
@media (max-width: 768px) {
    nav {
        padding: 20px;
    }

    .nav-links {
        display: none;
        flex-direction: column;
        position: absolute;
        top: 70px;
        right: 0;
        width: 50%;
        background: rgba(0, 0, 0, 0.9);
        text-align: right;
        padding: 10px;
        border-radius: 10px;
    }

    .nav-links.active {
        display: flex;
    }
    .nav-links li {
        margin: 15px 20px;
    }
    .menu-toggle {
        display: flex;
    }

    .menu-toggle.active .bar:nth-child(1) {
        transform: rotate(-45deg) translate(-5px, 6px);
    }

    .menu-toggle.active .bar:nth-child(2) {
        opacity: 0;
    }

    .menu-toggle.active .bar:nth-child(3) {
        transform: rotate(45deg) translate(-5px, -6px);
    }
}

.social-links {
    margin-top: 20px;
    display: flex;
    justify-content: center;
    gap: 20px; /* Even spacing */
}

/* Default Icon Styles (Simple, White) */
.social-links a {
    display: flex;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    color: white;  /* Default white */
    font-size: 28px;  /* Slightly bigger for better UI */
    width: 50px;
    height: 50px;
    border-radius: 50%;
    transition: transform 0.3s ease-in-out, color 0.3s ease-in-out, background 0.3s ease-in-out;
}

/* Hover Effect (Original Brand Colors) */
.social-links a:hover {
    transform: scale(1.2);
}

/* GitHub - Blue */
.social-links a[href*="github"]:hover {
    color: #4078c0;
}

/* LinkedIn - Blue */
.social-links a[href*="linkedin"]:hover {
    color: #0077b5;
}

/* Twitter/X - Light Blue */
.social-links a[href*="twitter"]:hover {
    color: #0797f1;
}

/* Hero Section */
.hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
}

.hero h1 {
    font-size: 50px;
    margin-bottom: 10px;
    opacity: 0;
    transform: translateY(-30px);
}

.hero p {
    font-size: 20px;
    color: #bbb;
    opacity: 0;
    transform: translateY(30px);
}

/* Call-to-Action Buttons */
.cta-buttons {
    display: flex;
    gap: 15px;
    margin-top: 20px;
}

.btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 20px;
    font-size: 16px;
    font-weight: 600;
    text-decoration: none;
    border-radius: 8px;
    transition: 0.3s;
}

.resume-btn {
    background-color: #007bff;
    color: white;
}

.resume-btn:hover {
    background-color: #0056b3;
    box-shadow: 0px 5px 10px rgba(0, 123, 255, 0.3);
}

.contact-btn {
    background-color: #28a745;
    color: white;
}

.contact-btn:hover {
    background-color: #1e7e34;
    box-shadow: 0px 5px 10px rgba(40, 167, 69, 0.3);
}

/* Tablet Screens (Up to 1024px) */
@media (max-width: 1024px) {
    .hero h1 {
        font-size: 40px;
    }

    .hero p {
        font-size: 18px;
    }

    .cta-buttons {
        flex-direction: column;
        gap: 10px;
    }
}

/* Mobile Screens (Up to 768px) */
@media (max-width: 768px) {
    body {
        padding-top: 60px;
    }

    .hero h1 {
        font-size: 35px;
    }

    .hero p {
        font-size: 16px;
    }

    /* Adjusting Social Icons */
    .social-links a {
        font-size: 24px;
        width: 40px;
        height: 40px;
    }
}

/* Small Mobile Screens (Up to 480px) */
@media (max-width: 480px) {
    body {
        padding-top: 60px;
    }

    .hero h1 {
        font-size: 28px;
    }

    .hero p {
        font-size: 14px;
    }

    .cta-buttons .btn {
        font-size: 14px;
        padding: 10px 15px;
    }

    /* Reduce social icon size */
    .social-links a {
        font-size: 22px;
        width: 35px;
        height: 35px;
    }
}
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script >    document.addEventListener("DOMContentLoaded", function() {
        // GSAP Animations
        gsap.from("nav", { duration: 1, y: -50, opacity: 0, ease: "power2.out" });
        gsap.to(".hero h1", { duration: 1, opacity: 1, y: 0, ease: "power2.out" });
        gsap.to(".hero p", { duration: 1.2, opacity: 1, y: 0, ease: "power2.out", delay: 0.3 });
    
        // Mobile Menu Toggle
        const mobileMenu = document.getElementById("mobile-menu");
        const navLinks = document.getElementById("nav-links");
    
        mobileMenu.addEventListener("click", () => {
            navLinks.classList.toggle("active");
            mobileMenu.classList.toggle("active");
        });
    });
