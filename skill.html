<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skills - mk shahi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .skills-container {
            padding: 100px 20px;
            margin-top: 80px;
        }

        .skills-section {
            max-width: 500px;
            margin: auto;
            text-align: left;
        }

        .skill {
            margin: 20px 0;
        }

        .skill-name {
            font-size: 18px;
            font-weight: bold;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #444;
            border-radius: 5px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0;
            background: #ff5733;
            transition: width 1s ease-in-out;
        }

        .charts-container {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 30px;
        }

        canvas {
            max-width: 200px;
            max-height: 200px;
        }
    </style>
</head>
<body>

    <nav>
        <h2>Portfolio</h2>
        <ul class="nav-links" id="nav-links">
            <li><a href="/index.html">Home</a></li>
            <li><a href="/about.html">About</a></li>
            <li><a href="/education.html">Education</a></li>
            <li><a href="/project.html">Projects</a></li>
            <li><a href="/skill.html">Skills</a></li>
            <li><a href="/contact.html">Contact</a></li>
        </ul>
        <!-- Responsive Menu Icon -->
        <div class="menu-toggle" id="mobile-menu">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>
    </nav>

    <section class="skills-container">
        <h1>Technical Skills</h1>
        <div class="skills-section">
            <div class="skill">
                <div class="skill-name">HTML & CSS</div>
                <div class="progress-bar"><div class="progress-bar-fill" data-progress="90%"></div></div>
            </div>
            <div class="skill">
                <div class="skill-name">Java</div>
                <div class="progress-bar"><div class="progress-bar-fill" data-progress="80%"></div></div>
            </div>
            <div class="skill">
                <div class="skill-name">Mysql</div>
                <div class="progress-bar"><div class="progress-bar-fill" data-progress="90%"></div></div>
            </div>
            <div class="skill">
                <div class="skill-name">Python</div>
                <div class="progress-bar"><div class="progress-bar-fill" data-progress="55%"></div></div>
            </div>
        </div>

        <h1>Soft Skills</h1>
        <div class="charts-container">
            <canvas id="communication-chart"></canvas>
            <canvas id="teamwork-chart"></canvas>
        </div>
    </section>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="script.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            gsap.from("nav", { duration: 1, y: -50, opacity: 0, ease: "power2.out" });
            gsap.to(".progress-bar-fill", {
                width: function(i, target) {
                    return target.getAttribute("data-progress");
                },
                duration: 2,
                ease: "power2.out"
            });
        });

        const communicationChart = new Chart(document.getElementById("communication-chart"), {
            type: "doughnut",
            data: {
                labels: ["Communication", "Remaining"],
                datasets: [{
                    data: [85, 15],
                    backgroundColor: ["#ff5733", "#444"],
                }]
            },
            options: { responsive: true }
        });

        const teamworkChart = new Chart(document.getElementById("teamwork-chart"), {
            type: "doughnut",
            data: {
                labels: ["Teamwork", "Remaining"],
                datasets: [{
                    data: [90, 10],
                    backgroundColor: ["#ff5733", "#444"],
                }]
            },
            options: { responsive: true }
        });
    </script>
</body>
</html>
