    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
            scroll-behavior: smooth;
        }
        
        body {
            background: #121212;
            color: #fff;
            text-align: center;
            padding-top: 80px; /* Prevent navbar overlap */
        }
        
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background: rgba(0, 0, 0, 0.9);
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
            z-index: 1000;
            transition: background 0.3s ease-in-out;
        }
        
        nav h2 {
            font-size: 26px;
            font-weight: bold;
            color: #ff5733;
        }
        
        .nav-links {
            list-style: none;
            display: flex;
        }
        
        .nav-links li {
            margin: 0 15px;
            position: relative;
        }
        
        .nav-links li a {
            text-decoration: none;
            color: #fff;
            font-size: 18px;
            padding: 5px 10px;
            transition: color 0.3s ease-in-out;
            position: relative;
        }
        
        .nav-links li a::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -5px;
            width: 100%;
            height: 2px;
            background: #ff5733;
            transform: scaleX(0);
            transition: transform 0.3s ease-in-out;
        }
        
        .nav-links li a:hover::after {
            transform: scaleX(1);
        }
        
        .nav-links li a:hover {
            color: #ff5733;
        }
        
        .menu-toggle {
            display: none;
            flex-direction: column;
            cursor: pointer;
        }
        
        .bar {
            background: white;
            height: 4px;
            width: 30px;
            margin: 5px 0;
            transition: 0.4s;
        }
        
        .projects-section {
            padding: 100px 50px 50px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
        }
        
        .project-card {
            background: #1e1e1e;
            border-radius: 15px;
            width: 350px;
            margin: 30px 20px; /* Reduced margin to prevent overlap */
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 87, 51, 0.2);
        }
        
        .project-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(255, 87, 51, 0.2);
            border-color: rgba(255, 87, 51, 0.5);
        }
        
        .project-card-image-container {
            position: relative;
            overflow: hidden;
        }
        
        .project-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            transition: transform 0.3s ease;
        }
        
        .project-card:hover img {
            transform: scale(1.1);
        }
        
        .project-tech-tags {
            position: absolute;
            bottom: 10px;
            left: 10px;
            display: flex;
            gap: 5px;
        }
        
        .tech-tag {
            background: rgba(0, 0, 0, 0.7);
            color: #ff5733;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 12px;
        }
        
        .project-card-content {
            padding: 20px;
            text-align: left;
        }
        
        .project-card h3 {
            color: #ff5733;
            margin-bottom: 10px;
            font-size: 22px;
        }
        
        .project-card p {
            color: #bbb;
            margin-bottom: 15px;
            line-height: 1.6;
        }
        
        .project-links {
            display: flex;
            gap: 15px;
        }
        
        .project-link {
            text-decoration: none;
            color: white;
            background: #333;
            padding: 8px 15px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }
        
        .project-link:hover {
            background: #ff5733;
            transform: scale(1.05);
        }
        
        /* Responsive Design */
        @media (max-width: 1024px) {
            .projects-section {
                padding: 100px 30px 50px;
                gap: 25px;
            }
        
            .project-card {
                width: calc(50% - 30px);
                max-width: 350px;
                margin: 20px 10px;
            }
        }
        
        @media (max-width: 768px) {
            nav {
                padding: 20px;
            }
        
            .nav-links {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 70px;
                right: 0;
                width: 50%;
                background: rgba(0, 0, 0, 0.9);
                text-align: right;
                padding: 10px;
                border-radius: 10px;
            }
        
            .nav-links.active {
                display: flex;
            }
        
            .nav-links li {
                margin: 15px 20px;
            }
        
            .menu-toggle {
                display: flex;
            }
        
            .menu-toggle.active .bar:nth-child(1) {
                transform: rotate(-45deg) translate(-5px, 6px);
            }
        
            .menu-toggle.active .bar:nth-child(2) {
                opacity: 0;
            }
        
            .menu-toggle.active .bar:nth-child(3) {
                transform: rotate(45deg) translate(-5px, -6px);
            }
        
            .projects-section {
                padding: 100px 20px 50px;
                gap: 20px;
            }
        
            .project-card {
                width: 90%;
                max-width: none;
                margin: 20px 20px;
            }
        
            .project-card img {
                height: 220px;
            }
        
            .project-card-content {
                padding: 15px;
            }
        
            .project-card h3 {
                font-size: 20px;
            }
        
            .project-card p {
                font-size: 14px;
            }
        
            .project-link {
                padding: 6px 12px;
                font-size: 14px;
            }
        }
        
        @media (max-width: 480px) {
            body {
                padding-top: 60px;
            }
        
            .projects-section {
                padding: 80px 10px 30px;
                flex-direction: column;
                align-items: center;
            }
        
            .project-card {
                width: 90%;
                margin: 10px 10;
            }
        
            .project-card img {
                height: 200px;
            }
        
            .project-card-content {
                padding: 12px;
            }
        
            .project-card h3 {
                font-size: 18px;
            }
        
            .project-card p {
                font-size: 13px;
            }
        
            .project-link {
                padding: 5px 10px;
                font-size: 13px;
            }
        }
    </style>
</head>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // GSAP Animations
            gsap.from("nav", { duration: 1, y: -50, opacity: 0, ease: "power2.out" });
            gsap.to(".hero h1", { duration: 1, opacity: 1, y: 0, ease: "power2.out" });
            gsap.to(".hero p", { duration: 1.2, opacity: 1, y: 0, ease: "power2.out", delay: 0.3 });
        
            // Mobile Menu Toggle
            const mobileMenu = document.getElementById("mobile-menu");
            const navLinks = document.getElementById("nav-links");
        
            mobileMenu.addEventListener("click", () => {
                navLinks.classList.toggle("active");
                mobileMenu.classList.toggle("active");
            });
        });
         
    </script>
