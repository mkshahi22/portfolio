<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="Contact Mitthu Kumar for web development and Android app development inquiries.">
    <meta name="keywords" content="Contact, Web Developer, Frontend Developer, Android Developer, Mitthu Kumar">
    <meta name="robots" content="index, follow">

    <!-- Open Graph for Social Media -->
    <meta property="og:title" content="Contact Mitthu Kumar | Web Developer">
    <meta property="og:description" content="Get in touch with Mitthu Kumar for web and mobile development projects.">
    <meta property="og:image" content="./web.png">
    <meta property="og:url" content="https://mkshahi.netlify.app/contact.html">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Contact Mitthu Kumar | Web Developer">
    <meta name="twitter:description" content="Reach out for web and mobile development opportunities.">
    <meta name="twitter:image" content="https://yourwebsite.com/assets/preview.jpg">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="footer.css">
    <style>
        /* General Styles (Matching index.html) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background: #121212;
            color: #fff;
            text-align: center;
        }

        /* Navigation Styles (from index.html) */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background: rgba(0, 0, 0, 0.9);
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
            z-index: 1000;
            transition: background 0.3s ease-in-out;
        }

        nav h2 {
            font-size: 26px;
            font-weight: bold;
            color: #ff5733;
        }

        .nav-links {
            list-style: none;
            display: flex;
        }

        .nav-links li {
            margin: 0 15px;
            position: relative;
        }

        .nav-links li a {
            text-decoration: none;
            color: #fff;
            font-size: 18px;
            padding: 5px 10px;
            transition: color 0.3s ease-in-out;
            position: relative;
        }

        .nav-links li a::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -5px;
            width: 100%;
            height: 2px;
            background: #ff5733;
            transform: scaleX(0);
            transition: transform 0.3s ease-in-out;
        }

        .nav-links li a:hover::after {
            transform: scaleX(1);
        }

        .nav-links li a:hover {
            color: #ff5733;
        }

        /* Menu Toggle Styles */
        .menu-toggle {
            display: none;
            flex-direction: column;
            cursor: pointer;
        }

        .bar {
            background: white;
            height: 4px;
            width: 30px;
            margin: 5px 0;
            transition: 0.4s;
        }

        /* Contact Section */
        .contact {
            max-width: 550px;
            margin: 120px auto 100px;
            padding: 25px;
            background: rgba(0, 123, 255, 0.1);
            border-radius: 10px;
            box-shadow: 0px 0px 15px rgba(0, 123, 255, 0.3);
            transition: transform 0.3s ease-in-out, box-shadow 0.3s ease-in-out;
        }

        .contact:hover {
            transform: scale(1.02);
            box-shadow: 0px 0px 20px rgba(0, 123, 255, 0.5);
        }

        .contact h1 {
            color: #ff5733;
            margin-bottom: 25px;
            font-size: 2.4rem;
        }

        .contact-info {
            display: flex;
            justify-content: space-between;
            text-align: left;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .contact-info div {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #bbb;
            margin-bottom: 10px;
            flex-basis: calc(33.333% - 10px);
        }

        .contact-info i {
            font-size: 12px;
            color: #ff5733;
            margin-right: 8px;
        }

        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
            animation: fadeIn 1s ease-in-out;
        }

        .contact-form input, 
        .contact-form textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ff5733;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border-radius: 8px;
            font-size: 12px;
            outline: none;
            transition: transform 0.3s, box-shadow 0.3s, background 0.3s;
        }

        .contact-form input:focus, 
        .contact-form textarea:focus {
            transform: scale(1.02);
            box-shadow: 0px 0px 10px rgba(255, 87, 51, 0.5);
            border-color: #007bff;
        }

        .contact-form button {
            background: linear-gradient(45deg, #ff5733, #ff2e00);
            color: white;
            border: none;
            padding: 15px;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.3s, transform 0.3s;
            border-radius: 8px;
            margin-top: 10px;
        }

        .contact-form button:hover {
            background: linear-gradient(45deg, #ff2e00, #ff5733);
            transform: scale(1.05);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            nav {
                flex-direction: column;
                padding: 15px 20px;
            }

            .nav-links {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 70px;
                right: 0;
                width: 100%;
                background: rgba(0, 0, 0, 0.9);
                text-align: center;
                padding: 20px;
                border-radius: 10px;
            }

            .nav-links.active {
                display: flex;
            }

            .nav-links li {
                margin: 15px 0;
            }

            .menu-toggle {
                display: flex;
            }

            .menu-toggle.active .bar:nth-child(1) {
                transform: rotate(-45deg) translate(-5px, 6px);
            }

            .menu-toggle.active .bar:nth-child(2) {
                opacity: 0;
            }

            .menu-toggle.active .bar:nth-child(3) {
                transform: rotate(45deg) translate(-5px, -6px);
            }

            .contact {
                margin: 100px 20px 50px;
                padding: 20px;
            }

            .contact-info {
                flex-direction: column;
            }

            .contact-info div {
                flex-basis: 100%;
            }
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <nav>
        <h2>Portfolio</h2>
        <ul class="nav-links" id="nav-links">
            <li><a href="/index.html">Home</a></li>
            <li><a href="/about.html">About</a></li>
            <li><a href="/education.html">Education</a></li>
            <li><a href="/project.html">Projects</a></li>
            <li><a href="/skill.html">Skills</a></li>
            <li><a href="/contact.html">Contact</a></li>
        </ul>
        <!-- Responsive Menu Icon -->
        <div class="menu-toggle" id="mobile-menu">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>
    </nav>

    <section class="contact">
        <h1>Contact Me</h1>
        <div class="contact-info">
            <div>
                <i class="fas fa-envelope"></i>
                <span>Mkshahi9798@gmail.com</span>
            </div>
            <div>
                <i class="fas fa-phone"></i>
                <span>+91 9798743248</span>
            </div>
            <div>
                <i class="fas fa-map-marker-alt"></i>
                <span>New Delhi, India</span>
            </div>
        </div>

        <form id="contact-form" class="contact-form">
            <input type="text" id="name" placeholder="Your Name" required>
            <input type="email" id="email" placeholder="Your Email" required>
            <input type="text" id="subject" placeholder="Subject" required>
            <textarea id="message" placeholder="Your Message" rows="4" required></textarea>
            <button type="submit" id="submitBtn">Send Message</button>
        </form>
    </section>
    <footer class="footer">
        © 2025 Mitthu Kumar. All Rights Reserved.
    </footer>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // GSAP Animations
            gsap.from("nav", { duration: 1, y: -50, opacity: 0, ease: "power2.out" });
            gsap.from(".contact", { duration: 1, opacity: 0, y: 50, ease: "power2.out" });
        
            // Mobile Menu Toggle
            const mobileMenu = document.getElementById("mobile-menu");
            const navLinks = document.getElementById("nav-links");
        
            mobileMenu.addEventListener("click", () => {
                navLinks.classList.toggle("active");
                mobileMenu.classList.toggle("active");
            });
        
            // Form Submission
            const form = document.getElementById("contact-form");
            form.addEventListener("submit", function(event) {
                event.preventDefault();
        
                // Get form values
                let name = document.getElementById("name").value.trim();
                let email = document.getElementById("email").value.trim();
                let subject = document.getElementById("subject").value.trim();
                let message = document.getElementById("message").value.trim();
        
                // Validate email
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(email)) {
                    alert("Please enter a valid email address.");
                    return;
                }
        
                // Basic form validation
                if (!name || !email || !subject || !message) {
                    alert("Please fill all the fields.");
                    return;
                }
        
                // Disable submit button to prevent multiple submissions
                const submitBtn = document.getElementById("submitBtn");
                submitBtn.disabled = true;
                submitBtn.textContent = "Sending...";
        
                // Google Apps Script Endpoint for form submission
                const GOOGLE_SHEETS_URL = 'https://script.google.com/macros/s/AKfycbxpGN_-sKv9ZhbRGhLr_IWYtmQwyv2QSv9dGuzZ7w0Q/dev';
                
                fetch(GOOGLE_SHEETS_URL, {  
                    method: "POST",
                    mode: 'cors', // Changed from no-cors to cors
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        name: name,
                        email: email,
                        subject: subject,
                        message: message,
                        timestamp: new Date().toISOString()
                    })
                })
                .then(response => {
                    // Check if response is ok
                    if (!response.ok) {
                        throw new Error('Network response was not ok');
                    }
                    return response.json();
                })
                .then(data => {
                    // Reset form and button
                    form.reset();
                    submitBtn.disabled = false;
                    submitBtn.textContent = "Send Message";
        
                    // Show success message
                    alert("Message sent successfully! I'll get back to you soon.");
                })
                .catch(error => {
                    console.error("Error:", error);
                    
                    // Reset button
                    submitBtn.disabled = false;
                    submitBtn.textContent = "Send Message";
        
                    // Show error message
                    alert("Something went wrong. Please try again later.");
                });
            });
        });
    </script>
    <script src="./footer.js"></script>
</body>
</html>
